{% extends 'school_admin/base_admin.html' %}

{% block title %}{{ title }} - Admin Panel{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-money-bill-wave"></i> {{ title }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{{ form.invoice.label }}</label>
                        {{ form.invoice }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ form.amount.label }}</label>
                        {{ form.amount }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ form.method.label }}</label>
                        {{ form.method }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Payment
                        </button>
                        <a href="{% url 'school_admin:payments_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control, .form-select {
        border: 2px solid #e9ecef;
        border-radius: 6px;
        padding: 10px 12px;
    }

    .form-control:focus, .form-select:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
</style>
{% endblock %}
