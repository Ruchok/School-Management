{% extends 'base.html' %}
{% block title %}Classes - School Management{% endblock %}
{% block page_heading %}Classes Grid{% endblock %}

{% block content %}
<div class="card">
    <div style="margin-bottom: 20px;">
        <h2>Classes List</h2>
        <p>View and manage all classes</p>
    </div>
    
    <div id="classesGrid" class="ag-theme-quartz ag-grid-wrapper" style="height: 500px;"></div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
    const columnDefs = [
        { headerName: "ID", field: "id", width: 80 },
        { headerName: "Class Name", field: "name", width: 150 },
        { headerName: "Section", field: "section", width: 100 }
    ];

    const gridOptions = {
        columnDefs: columnDefs,
        rowData: [],
        pagination: true,
        paginationPageSize: 20,
        defaultColDef: {
            sortable: true,
            filter: true,
            resizable: true
        }
    };

    const gridDiv = document.querySelector('#classesGrid');
    new agGrid.Grid(gridDiv, gridOptions);

    fetch('{% url "academics:classes_api" %}')
        .then(response => response.json())
        .then(json => {
            gridOptions.api.setGridOption('rowData', json.data);
        })
        .catch(error => console.error('Error fetching classes:', error));
</script>
{% endblock %}
