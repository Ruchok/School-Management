{% extends 'base.html' %}
{% block title %}Exams - School Management{% endblock %}
{% block page_heading %}Exams Grid{% endblock %}

{% block content %}
<div class="card">
    <div style="margin-bottom: 20px;">
        <h2>Exams List</h2>
        <p>View and manage all exams</p>
    </div>
    
    <div id="examsGrid" class="ag-theme-quartz ag-grid-wrapper" style="height: 500px;"></div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
    const columnDefs = [
        { headerName: "ID", field: "id", width: 80 },
        { headerName: "Exam Name", field: "name", width: 150 },
        { headerName: "Subject", field: "subject", width: 150 },
        { headerName: "Date", field: "date", width: 120 },
        { headerName: "Total Marks", field: "totalMarks", width: 120 }
    ];

    const gridOptions = {
        columnDefs: columnDefs,
        rowData: [],
        pagination: true,
        paginationPageSize: 20,
        defaultColDef: {
            sortable: true,
            filter: true,
            resizable: true
        }
    };

    const gridDiv = document.querySelector('#examsGrid');
    new agGrid.Grid(gridDiv, gridOptions);

    fetch('{% url "academics:exams_api" %}')
        .then(response => response.json())
        .then(json => {
            gridOptions.api.setGridOption('rowData', json.data);
        })
        .catch(error => console.error('Error fetching exams:', error));
</script>
{% endblock %}
