{% extends 'base.html' %}
{% block title %}Login | EduPulse{% endblock %}
{% block content %}
<div class="card">
    <h2>Sign In</h2>
    <p class="subtitle">Access your school management dashboard.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Login</button>
    </form>
</div>
{% endblock %}
